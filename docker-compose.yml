services:
  backend:
    build: ./backend
    container_name: slack-summary-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      - DB_PATH=/data/slack_summary.db
      - PORT=3001
    volumes:
      - ./backend:/data

  frontend:
    build: ./frontend
    container_name: slack-summary-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
